schema_version: 1
# Canonical, platform-independent execution budget. Adapters translate this into their
# native subagent/role-profile mechanism; they must not raise these limits.
defaults:
  preferred_skills_per_agent: [1, 3]
  max_skills_per_agent: 3
  hard_limit_skills_per_agent: 5
  preferred_active_subagents: 1
  max_active_subagents: 2
  hard_limit_active_subagents: 3
task_classes:
  question:
    examples: [explanation, evaluation, information_request]
    max_skills: 1
    max_subagents: 0
    planner: false
    architect: false
    graphify: false
    repository_change: false
  tiny:
    examples: [typo, small_text_change, single_value_or_config_fix, local_single_file_change]
    max_skills: 1
    max_subagents: 0
    planner: false
    architect: false
    graphify: false
    reviewer: only_if_high_risk
  small:
    examples: [scoped_bug_fix, small_ui_component, local_change_across_a_few_related_files]
    preferred_skills: 1
    max_skills: 2
    preferred_subagents: 0
    max_subagents: 1
    planner: false
    graphify: false
    reviewer_or_qa: only_if_measurable_benefit
  medium:
    examples: [new_feature, change_affecting_a_few_modules, independent_frontend_or_backend_work, meaningful_test_or_adapter_work]
    preferred_skills: [1, 3]
    max_skills: 3
    preferred_subagents: 1
    max_subagents: 2
    planner: conditional
    graphify: conditional
    reviewer_or_qa: when_appropriate
  large_or_risky:
    examples: [repository_wide_architecture_work, multi_module_refactor, installer_or_verifier_infrastructure, auth_payment_secrets_tenant_isolation, multi_platform_adapter_system]
    preferred_skills: [2, 4]
    hard_limit_skills: 5
    preferred_subagents: [1, 2]
    hard_limit_subagents: 3
    planner_or_architect: when_genuinely_needed
    graphify: when_repository_relationships_are_genuinely_needed
    security_reviewer: when_a_risky_area_is_touched
    qa_or_release_review: when_needed_for_verification
subagent_rules:
  # Limits are a ceiling, not a quota to fill.
  open_subagent_only_if_all_of:
    - independent_expertise_is_required
    - the_work_is_genuinely_decomposable
    - file_ownership_does_not_overlap
    - measurable_time_or_quality_benefit_over_the_main_agent
  never:
    - open_a_subagent_for_a_tiny_task
    - open_more_than_one_subagent_for_a_small_task
    - open_a_subagent_to_answer_a_simple_question
    - open_two_subagents_for_the_same_role
    - rerun_the_same_skill_scope_in_two_agents
    - run_parallel_subagents_on_the_same_files
    - nest_subagents
    - pass_full_chat_history_to_a_subagent
  require:
    - task_contract
    - acceptance_criteria
    - owned_paths_for_parallel_work
runtime_flags:
  preload_all_skills: false
  preload_vendor_repositories: false
  preload_all_roles: false
  load_on_demand: true
  progressive_disclosure: true
  nested_subagents: false
  cross_platform_delegation: false
  pass_full_chat_history: false
  duplicate_skill_execution: false
  duplicate_role_execution: false
  require_task_contract: true
  require_acceptance_criteria: true
  require_owned_paths_for_parallel_work: true
