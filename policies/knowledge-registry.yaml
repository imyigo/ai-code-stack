schema_version: 1
# Knowledge Registry: the broader persistent, versioned index of static engineering
# knowledge. It is not a runtime agent-orchestration layer and never stores
# conversation state.
includes:
  - skills
  - roles
  - policies
  - vendors
  - aliases
  - capabilities
  - platform_adapters
  - routing_rules
  - security_classifications
  - manifest_schemas
  - version_locks
  - compatibility
  - dependency_maps
  - conflict_maps
  - fallback_maps
excludes:
  - conversation_history
  - user_task_content
  - agent_reasoning_or_chain_of_thought
  - cross_platform_task_state
  - cross_platform_shared_memory
  - claude_code_session_transfer_to_cursor
  - codex_run_history_transfer_to_antigravity
manifests:
  - manifests/repositories.json
  - manifests/skills.json
  - manifests/platforms.json
  - manifests/roles.json
  - manifests/capabilities.json
  - manifests/links.json
  - manifests/checksums.json
  - manifests/knowledge-registry.json
  - manifests/skill-routing.json
  - manifests/token-costs.json
  - manifests/cache-state.json
