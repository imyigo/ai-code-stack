schema_version: 1
roles:
  - {name: product-planner, purpose: Define product outcome and scope, skills: [office-hours, autoplan]}
  - {name: requirements-analyst, purpose: Convert intent into testable requirements, skills: [spec, requirements-analysis]}
  - {name: architect, purpose: Design boundaries and impact-aware implementation, skills: [architecture-decision-records, graphify]}
  - {name: researcher, purpose: Gather primary evidence before decisions, skills: [deep-research, documentation-lookup]}
  - {name: implementer, purpose: Implement the smallest complete change, skills: [coding-standards, error-handling]}
  - {name: frontend-engineer, purpose: Build accessible frontend systems, skills: [frontend-patterns, frontend-a11y]}
  - {name: backend-engineer, purpose: Build APIs and backend services, skills: [backend-patterns, api-design]}
  - {name: mobile-engineer, purpose: Build native and cross-platform mobile products, skills: [android-clean-architecture, dart-flutter-patterns]}
  - {name: desktop-engineer, purpose: Build desktop applications, skills: [foundation-models-on-device, coding-standards]}
  - {name: ui-specialist, purpose: Design and review interfaces, skills: [frontend-design-direction, design-system, accessibility]}
  - {name: database-engineer, purpose: Design safe data models and migrations, skills: [database-migrations, backend-patterns]}
  - {name: test-engineer, purpose: Produce fresh verification evidence, skills: [e2e-testing, ai-regression-testing]}
  - {name: browser-qa, purpose: Validate user journeys in a real browser, skills: [browser-qa, qa]}
  - {name: reviewer, purpose: Run one evidence-backed engineering review, skills: [review]}
  - {name: security-reviewer, purpose: Classify risk and enforce fail-closed release, skills: [cso]}
  - {name: devops-engineer, purpose: Build deployment and operational controls, skills: [deployment-patterns, docker-patterns]}
  - {name: release-reviewer, purpose: Verify release gates and ship readiness, skills: [ship, delivery-gate]}
  - {name: repository-maintainer, purpose: Maintain pinned vendors and reproducible updates, skills: [git-workflow, github-ops]}
